[tox]
envlist=py36,py37,py38,py39,py310

[testenv]
deps=-rrequirements.test.txt
commands=pytest

[tool.ruff]
line-length = 120
exclude = ["env", ".tox", ".venv"]
ignore = ["E221"]  # E221 multiple spaces before operator - allow aligning in plastron/namespace/__init__.py

[pytest]
markers =
    jobs_dir
